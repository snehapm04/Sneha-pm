<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Liquid Glass UI</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #111827, #050507);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      color: white;
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 2px;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="overlay">
  Liquid Glass Portfolio
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* -------- Lighting ---------- */

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5, 5, 5);
scene.add(light);

/* -------- Liquid Glass Material ---------- */

const glassMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0,
  roughness: 0,
  transmission: 1,
  thickness: 1.5,
  transparent: true,
  opacity: 1,
  clearcoat: 1,
  clearcoatRoughness: 0
});

/* -------- Create Floating Glass Cards ---------- */

const cards = [];

function createCard(x, y, z) {
  const geometry = new THREE.BoxGeometry(2.5, 1.5, 0.2);
  const mesh = new THREE.Mesh(geometry, glassMaterial);

  mesh.position.set(x, y, z);
  scene.add(mesh);

  cards.push(mesh);
}

createCard(-3, 1.5, -2);
createCard(2, -1, -4);
createCard(0, 2, -6);

/* -------- Mouse Parallax ---------- */

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

/* -------- Animation ---------- */

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();

  cards.forEach((card, i) => {
    // Floating motion
    card.position.y += Math.sin(time + i) * 0.003;

    // Subtle liquid tilt
    card.rotation.x = Math.sin(time * 0.5 + i) * 0.1;
    card.rotation.y = Math.cos(time * 0.4 + i) * 0.1;
  });

  // Camera smooth follow
  camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.05;
  camera.position.y += (-mouseY * 1.5 - camera.position.y) * 0.05;

  renderer.render(scene, camera);
}

animate();

/* -------- Resize ---------- */

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
